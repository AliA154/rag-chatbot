<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <style>
        :root {
            --bg: #f7f7f8;
            --surface: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #1a1a1a;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --user-bg: #2563eb;
            --bot-bg: #f3f4f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 { font-size: 18px; font-weight: 600; }

        .upload-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .upload-area label {
            cursor: pointer;
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .upload-area label:hover { background: var(--primary-hover); }
        .upload-area input { display: none; }
        #upload-status { font-size: 13px; color: var(--text-muted); }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 720px;
            width: fit-content;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .message.user {
            background: var(--user-bg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: var(--bot-bg);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.system {
            background: transparent;
            color: var(--text-muted);
            align-self: center;
            font-size: 13px;
            text-align: center;
        }

        .typing {
            color: var(--text-muted);
            font-style: italic;
            font-size: 14px;
            align-self: flex-start;
        }

        .input-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            gap: 12px;
        }

        .input-bar input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        .input-bar input:focus { border-color: var(--primary); }

        .input-bar button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-bar button:hover { background: var(--primary-hover); }
        .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1>RAG Chatbot</h1>
        <div class="upload-area">
            <span id="upload-status">No documents uploaded</span>
            <label for="file-input">Upload Document</label>
            <input type="file" id="file-input" accept=".pdf,.txt,.md">
        </div>
    </header>

    <div class="chat-container" id="chat">
        <div class="message system">Upload a PDF, TXT, or MD file, then ask questions about it.</div>
    </div>

    <div class="input-bar">
        <input type="text" id="question" placeholder="Ask a question about your documents..." autocomplete="off">
        <button id="send-btn" onclick="askQuestion()">Send</button>
    </div>

    <script>
        const chat = document.getElementById("chat");
        const input = document.getElementById("question");
        const sendBtn = document.getElementById("send-btn");
        const fileInput = document.getElementById("file-input");
        const uploadStatus = document.getElementById("upload-status");
        let docCount = 0;

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !sendBtn.disabled) askQuestion();
        });

        fileInput.addEventListener("change", async () => {
            const file = fileInput.files[0];
            if (!file) return;

            uploadStatus.textContent = `Uploading ${file.name}...`;

            const form = new FormData();
            form.append("file", file);

            try {
                const res = await fetch("/upload", { method: "POST", body: form });
                const data = await res.json();

                if (data.error) {
                    uploadStatus.textContent = `Error: ${data.error}`;
                    return;
                }

                docCount++;
                uploadStatus.textContent = `${docCount} document(s) loaded`;
                addMessage("system", `"${data.filename}" uploaded (${data.chunks} chunks).`);
            } catch (err) {
                uploadStatus.textContent = "Upload failed";
            }

            fileInput.value = "";
        });

        async function askQuestion() {
            const question = input.value.trim();
            if (!question) return;

            addMessage("user", question);
            input.value = "";
            sendBtn.disabled = true;

            const typing = document.createElement("div");
            typing.className = "typing";
            typing.textContent = "Thinking...";
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question }),
                });
                const data = await res.json();
                typing.remove();

                if (data.error) {
                    addMessage("bot", `Error: ${data.error}`);
                } else {
                    addMessage("bot", data.answer);
                }
            } catch (err) {
                typing.remove();
                addMessage("bot", "Something went wrong. Please try again.");
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function addMessage(role, text) {
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
